<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CandyFandy Mobile API</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui.css" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #fafafa; }
    .topbar { display: none !important; }
  </style>
</head>
<body>
<div id="swagger-ui"></div>
<script id="openapi-spec" type="application/yaml">openapi: 3.0.3
info:
  title: CandyFandy Mobile API
  description: |
    REST API for the CandyFandy mobile application.

    ## Authentication
    Protected endpoints require a Bearer token in the `Authorization` header:
    ```
    Authorization: Bearer <your_token>
    ```
    Tokens are obtained via the **Login** or **Register** endpoints and expire after **30 days**.

  version: "1.0.0"
  contact:
    name: CandyFandy Backend

servers:
  - url: https://candyfandy.com/dev/index.php
    description: Production server
  - url: http://candyfandy.test/index.php
    description: Local development server

tags:
  - name: Auth
    description: Login, register, logout, forgot/reset password
  - name: Products
    description: Browse and view products
  - name: Categories
    description: Product categories
  - name: Search
    description: Search products
  - name: Account
    description: Customer profile and addresses
  - name: Cart
    description: Shopping cart management
  - name: Orders
    description: Order history
  - name: Brands
    description: Brands / manufacturers filtered by category
  - name: Checkout
    description: Shipping methods, payment methods, and order placement
  - name: Wishlist
    description: Customer wishlist

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: HEX64
      description: 64-character hex token returned from login/register

  schemas:

    # ── Generic ─────────────────────────────────────────────────────────────

    SuccessMessage:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Action completed successfully

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: Human readable error message

    ValidationErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        errors:
          type: object
          additionalProperties:
            type: string
          example:
            email: Email is already registered
            password: Password must be between 4 and 40 characters

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 85
        total_pages:
          type: integer
          example: 5

    # ── Auth ────────────────────────────────────────────────────────────────

    CustomerSummary:
      type: object
      properties:
        customer_id:
          type: integer
          example: 5
        firstname:
          type: string
          example: John
        lastname:
          type: string
          example: Doe
        email:
          type: string
          format: email
          example: john@example.com
        telephone:
          type: string
          example: "+1234567890"

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        token:
          type: string
          example: a3f8c2e1d4b7f9a0c3e6d8b1f2a4c7e9d0b3f5a8c1e4d7b0f2a5c8e1d4b7f0a2
        customer:
          $ref: '#/components/schemas/CustomerSummary'

    # ── Products ────────────────────────────────────────────────────────────

    ProductListItem:
      type: object
      properties:
        product_id:
          type: integer
          example: 101
        name:
          type: string
          example: Haribo Gold Bears
        model:
          type: string
          example: HRB-001
        sku:
          type: string
          example: SKU-HRB-001
        image:
          type: string
          format: uri
          example: https://candyfandy.com/dev/upload/image/catalog/products/haribo.jpg
        price:
          type: number
          format: float
          example: 2.99
        special:
          type: number
          format: float
          nullable: true
          example: 1.99
        tax_class_id:
          type: integer
          example: 9
        quantity:
          type: integer
          example: 150
        rating:
          type: integer
          example: 4
        reviews:
          type: integer
          example: 23
        manufacturer:
          type: string
          example: Haribo
        date_available:
          type: string
          example: "2024-01-01"

    ProductOptionValue:
      type: object
      properties:
        product_option_value_id:
          type: integer
          example: 34
        name:
          type: string
          example: 200g
        image:
          type: string
          format: uri
          example: ""
        price:
          type: number
          example: 0.00
        price_prefix:
          type: string
          example: "+"
        quantity:
          type: integer
          example: 100

    ProductOption:
      type: object
      properties:
        product_option_id:
          type: integer
          example: 12
        name:
          type: string
          example: Size
        type:
          type: string
          example: select
          enum: [select, radio, checkbox, text, textarea, file, date, time, datetime]
        required:
          type: boolean
          example: true
        values:
          type: array
          items:
            $ref: '#/components/schemas/ProductOptionValue'

    ProductReview:
      type: object
      properties:
        author:
          type: string
          example: Jane S.
        rating:
          type: integer
          example: 5
        text:
          type: string
          example: Absolutely love these!
        date_added:
          type: string
          example: "2024-03-10"

    ProductDetail:
      allOf:
        - $ref: '#/components/schemas/ProductListItem'
        - type: object
          properties:
            description:
              type: string
              example: "<p>Classic Haribo Gold Bears in a 200g bag...</p>"
            minimum:
              type: integer
              example: 1
            weight:
              type: string
              example: "0.20"
            weight_class:
              type: string
              example: kg
            length:
              type: string
              example: "10.00"
            width:
              type: string
              example: "5.00"
            height:
              type: string
              example: "3.00"
            length_class:
              type: string
              example: cm
            images:
              type: array
              items:
                type: string
                format: uri
            options:
              type: array
              items:
                $ref: '#/components/schemas/ProductOption'
            reviews:
              type: array
              items:
                $ref: '#/components/schemas/ProductReview'
            related:
              type: array
              items:
                $ref: '#/components/schemas/ProductListItem'

    # ── Categories ──────────────────────────────────────────────────────────

    Category:
      type: object
      properties:
        category_id:
          type: integer
          example: 20
        parent_id:
          type: integer
          example: 0
        name:
          type: string
          example: Gummy Candy
        description:
          type: string
          example: All types of gummy and jelly candy
        image:
          type: string
          format: uri
          example: https://candyfandy.com/dev/upload/image/catalog/categories/gummy.jpg
        sort_order:
          type: integer
          example: 1

    CategoryDetail:
      allOf:
        - $ref: '#/components/schemas/Category'
        - type: object
          properties:
            children:
              type: array
              items:
                type: object
                properties:
                  category_id:
                    type: integer
                  name:
                    type: string
                  image:
                    type: string
                    format: uri

    # ── Best Sellers ─────────────────────────────────────────────────────────

    BestSellerListItem:
      allOf:
        - $ref: '#/components/schemas/ProductListItem'
        - type: object
          properties:
            total_sold:
              type: integer
              description: Total units sold (from product_bestseller table)
              example: 342

    # ── Brands ──────────────────────────────────────────────────────────────

    Brand:
      type: object
      properties:
        manufacturer_id:
          type: integer
          example: 12
        name:
          type: string
          example: Oreo
        image:
          type: string
          format: uri
          example: https://candyfandy.com/dev/upload/image/catalog/manufacturers/oreo.jpg
        sort_order:
          type: integer
          example: 0

    # ── Account ─────────────────────────────────────────────────────────────

    CustomerProfile:
      type: object
      properties:
        customer_id:
          type: integer
          example: 5
        firstname:
          type: string
          example: John
        lastname:
          type: string
          example: Doe
        email:
          type: string
          format: email
          example: john@example.com
        telephone:
          type: string
          example: "1234567890"
        newsletter:
          type: boolean
          example: false
        customer_group_id:
          type: integer
          example: 1
        date_added:
          type: string
          example: "2024-01-15 10:30:00"

    Address:
      type: object
      properties:
        address_id:
          type: integer
          example: 3
        firstname:
          type: string
          example: John
        lastname:
          type: string
          example: Doe
        company:
          type: string
          example: ""
        address_1:
          type: string
          example: 123 Candy Lane
        address_2:
          type: string
          example: Apt 4B
        city:
          type: string
          example: New York
        postcode:
          type: string
          example: "10001"
        zone:
          type: string
          example: New York
        zone_id:
          type: integer
          example: 3635
        country:
          type: string
          example: United States
        country_id:
          type: integer
          example: 223
        default:
          type: boolean
          example: true

    # ── Cart ────────────────────────────────────────────────────────────────

    CartItem:
      type: object
      properties:
        cart_id:
          type: integer
          example: 14
        product_id:
          type: integer
          example: 101
        name:
          type: string
          example: Haribo Gold Bears
        model:
          type: string
          example: HRB-001
        image:
          type: string
          format: uri
          example: https://candyfandy.com/dev/upload/image/catalog/products/haribo.jpg
        quantity:
          type: integer
          example: 2
        price:
          type: number
          example: 2.99
        total:
          type: number
          example: 5.98
        options:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                example: Size
              value:
                type: string
                example: 200g

    CartTotal:
      type: object
      properties:
        code:
          type: string
          example: sub_total
        title:
          type: string
          example: Sub-Total
        value:
          type: number
          example: 5.98

    Cart:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        totals:
          type: array
          items:
            $ref: '#/components/schemas/CartTotal'
        total:
          type: number
          example: 10.98
        item_count:
          type: integer
          example: 2
        has_shipping:
          type: boolean
          example: true

    # ── Orders ──────────────────────────────────────────────────────────────

    OrderListItem:
      type: object
      properties:
        order_id:
          type: integer
          example: 88
        status:
          type: string
          example: Complete
        date_added:
          type: string
          example: "2024-03-15 14:22:00"
        total:
          type: string
          example: "10.98"
        currency_code:
          type: string
          example: USD
        products:
          type: integer
          example: 2

    OrderProduct:
      type: object
      properties:
        order_product_id:
          type: integer
          example: 55
        product_id:
          type: integer
          example: 101
        name:
          type: string
          example: Haribo Gold Bears
        model:
          type: string
          example: HRB-001
        quantity:
          type: integer
          example: 2
        price:
          type: number
          example: 2.99
        total:
          type: number
          example: 5.98
        options:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              value:
                type: string

    OrderDetail:
      type: object
      properties:
        order_id:
          type: integer
          example: 88
        invoice_no:
          type: string
          example: INV-2024-0088
        status:
          type: string
          example: Complete
        date_added:
          type: string
          example: "2024-03-15 14:22:00"
        payment_method:
          type: string
          example: Credit Card
        shipping_method:
          type: string
          example: Flat Rate
        payment_address:
          type: object
          properties:
            firstname: { type: string }
            lastname:  { type: string }
            address_1: { type: string }
            city:      { type: string }
            country:   { type: string }
        shipping_address:
          type: object
          properties:
            firstname: { type: string }
            lastname:  { type: string }
            address_1: { type: string }
            city:      { type: string }
            country:   { type: string }
        products:
          type: array
          items:
            $ref: '#/components/schemas/OrderProduct'
        totals:
          type: array
          items:
            $ref: '#/components/schemas/CartTotal'
        history:
          type: array
          items:
            type: object
            properties:
              status:     { type: string }
              comment:    { type: string }
              date_added: { type: string }
        comment:
          type: string
        currency_code:
          type: string
          example: USD
        currency_value:
          type: number
          example: 1.0

    # ── Checkout ─────────────────────────────────────────────────────────────

    ShippingMethod:
      type: object
      properties:
        code:
          type: string
          description: "Method code in {extension}.{option} format"
          example: flat.flat
        name:
          type: string
          example: Flat Shipping Rate
        cost:
          type: number
          format: float
          example: 5.00
        text:
          type: string
          description: Formatted cost with currency
          example: "$5.00"

    PaymentMethod:
      type: object
      properties:
        code:
          type: string
          example: cod
        name:
          type: string
          example: Cash on Delivery

    CheckoutAddress:
      type: object
      description: Either provide address_id for a saved address, or supply all required inline fields.
      properties:
        address_id:
          type: integer
          description: ID of a saved customer address (alternative to inline fields)
          example: 3
        firstname:
          type: string
          example: John
        lastname:
          type: string
          example: Doe
        company:
          type: string
          example: ""
        address_1:
          type: string
          example: 123 Main St
        address_2:
          type: string
          example: ""
        city:
          type: string
          example: New York
        postcode:
          type: string
          example: "10001"
        country_id:
          type: integer
          example: 223
        zone_id:
          type: integer
          example: 3635

    CheckoutConfirmResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Order placed successfully
        order_id:
          type: integer
          example: 88

    # ── Wishlist ─────────────────────────────────────────────────────────────

    WishlistItem:
      type: object
      properties:
        product_id:
          type: integer
          example: 101
        name:
          type: string
          example: Haribo Gold Bears
        model:
          type: string
          example: HRB-001
        image:
          type: string
          format: uri
        price:
          type: number
          example: 2.99
        special:
          type: number
          nullable: true
          example: 1.99
        rating:
          type: integer
          example: 4

# ════════════════════════════════════════════════════════════════════════════
# PATHS
# ════════════════════════════════════════════════════════════════════════════

paths:

  # ── Auth ──────────────────────────────────────────────────────────────────

  /?route=mobile/auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: Authenticate customer and receive an access token.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  format: password
                  example: secret123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: Invalid email or password

  /?route=mobile/auth/register:
    post:
      tags: [Auth]
      summary: Register
      description: Create a new customer account and receive an access token.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [firstname, lastname, email, password, confirm]
              properties:
                firstname:
                  type: string
                  example: John
                lastname:
                  type: string
                  example: Doe
                email:
                  type: string
                  format: email
                  example: john@example.com
                telephone:
                  type: string
                  example: "1234567890"
                password:
                  type: string
                  format: password
                  minLength: 4
                  maxLength: 40
                  example: secret123
                confirm:
                  type: string
                  format: password
                  example: secret123
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  token:
                    type: string
                    example: a3f8c2e1d4b7f9a0...
                  customer_id:
                    type: integer
                    example: 12
                  message:
                    type: string
                    example: Account created successfully
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /?route=mobile/auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: Invalidate the current access token.
      security:
        - BearerAuth: []

      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Bearer <token>'
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Bearer <token>'
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'

  /?route=mobile/auth.forgotPassword:
    post:
      tags: [Auth]
      summary: Forgot Password
      description: |
        Send a password reset link to the customer's email address.

        Always returns `success: true` regardless of whether the email is registered (security best practice).

        The customer receives an email with a reset link containing a `code` query parameter.
        Extract this code and pass it to the **Reset Password** endpoint.

        The reset code expires in **10 minutes**.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: john@example.com
      responses:
        '200':
          description: Request accepted (email sent if account exists)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
              example:
                success: true
                message: If an account with that email exists, a password reset link has been sent.
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                success: false
                errors:
                  email: Valid email is required

  /?route=mobile/auth.resetPassword:
    post:
      tags: [Auth]
      summary: Reset Password
      description: |
        Set a new password using the reset code received by email.

        The `code` is the value of the `code` query parameter in the reset link sent to the customer's email.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [email, code, password, confirm]
              properties:
                email:
                  type: string
                  format: email
                  example: john@example.com
                code:
                  type: string
                  description: Reset code from the email link
                  example: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
                password:
                  type: string
                  format: password
                  minLength: 4
                  maxLength: 40
                  example: newSecret99
                confirm:
                  type: string
                  format: password
                  example: newSecret99
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
              example:
                success: true
                message: Password has been reset successfully
        '422':
          description: Invalid code or validation error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                invalid_code:
                  summary: Invalid or expired code
                  value:
                    success: false
                    error: Invalid or expired reset code
                validation:
                  summary: Validation errors
                  value:
                    success: false
                    errors:
                      password: Password must be between 4 and 40 characters
                      confirm: Passwords do not match

  # ── Products ──────────────────────────────────────────────────────────────

  /?route=mobile/product:
    get:
      tags: [Products]
      summary: List products (Step 3 — by brand & category)
      description: |
        Returns a paginated list of products. No authentication required.

        **Category → Brand → Products flow (Step 3):**
        Pass `manufacturer_id` (from the Brands endpoint) and optionally `category_id`
        to get products for a specific brand within a category.

        Example: `?route=mobile/product&manufacturer_id=8&category_id=20`
      parameters:
        - name: route
          in: query
          required: true
          schema:
            type: string
            enum: [mobile/product]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: category_id
          in: query
          schema:
            type: integer
          description: Filter by category
        - name: manufacturer_id
          in: query
          schema:
            type: integer
          description: Filter by brand
        - name: sort
          in: query
          schema:
            type: string
            default: p.date_added
            enum: [p.name, p.price, p.date_added, p.sort_order, p.model]
        - name: order
          in: query
          schema:
            type: string
            default: DESC
            enum: [ASC, DESC]
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductListItem'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /?route=mobile/product/info:
    get:
      tags: [Products]
      summary: Product detail
      description: Returns full product details including images, options, reviews and related products.
      parameters:
        - name: route
          in: query
          required: true
          schema:
            type: string
            enum: [mobile/product/info]
        - name: product_id
          in: query
          required: true
          schema:
            type: integer
          example: 101
      responses:
        '200':
          description: Product detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ProductDetail'
        '400':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /?route=mobile/product/bestseller:
    get:
      tags: [Products]
      summary: Best sellers
      description: |
        Returns the best-selling products ordered by total units sold (descending).
        Optionally filter by `category_id` or `sub_category_id` to get best sellers within a specific category.
      parameters:
        - name: route
          in: query
          required: true
          schema:
            type: string
            enum: [mobile/product/bestseller]
        - name: page
          in: query

          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Wishlist ──────────────────────────────────────────────────────────────

  /?route=mobile/wishlist:
    get:
      tags: [Wishlist]
      summary: Get wishlist
      security:
        - BearerAuth: []

      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Bearer <token>'
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Bearer <token>'
      responses:
        '200':
          description: Wishlist items
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WishlistItem'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /?route=mobile/wishlist/add:
    post:
      tags: [Wishlist]
      summary: Add to wishlist
      security:
        - BearerAuth: []

      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Bearer <token>'
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Bearer <token>'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [product_id]
              properties:
                product_id:
                  type: integer
                  example: 101
      responses:
        '200':
          description: Added to wishlist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /?route=mobile/wishlist/remove:
    post:
      tags: [Wishlist]
      summary: Remove from wishlist
      security:
        - BearerAuth: []

      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Bearer <token>'
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Bearer <token>'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [product_id]
              properties:
                product_id:
                  type: integer
                  example: 101
      responses:
        '200':
          description: Removed from wishlist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Checkout ────────────────────────────────────────────────────────────────

  /?route=mobile/checkout/shipping_methods:
    post:
      tags: [Checkout]
      summary: Get shipping methods
      description: |
        Returns available shipping methods for the given address.

        Supply either a saved **address_id** or inline address fields
        (`firstname`, `lastname`, `address_1`, `city`, `country_id`, and optionally `zone_id`, `postcode`).

        Returns an empty array when the cart contains no shippable items.
      security:
        - BearerAuth: []

      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Bearer <token>'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CheckoutAddress'
      responses:
        '200':
          description: List of available shipping methods
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ShippingMethod'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error or no shipping available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /?route=mobile/checkout/payment_methods:
    post:
      tags: [Checkout]
      summary: Get payment methods
      description: |
        Returns available payment methods.

        Optionally pass an **address_id** or inline address fields to use as the billing address
        (some payment gateways are geo-restricted).
      security:
        - BearerAuth: []

      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Bearer <token>'
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CheckoutAddress'
      responses:
        '200':
          description: List of available payment methods
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PaymentMethod'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: No payment methods available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /?route=mobile/checkout/confirm:
    post:
      tags: [Checkout]
      summary: Place order
      description: |
        Validates the cart, resolves shipping & payment, creates the order, and clears the cart.

        **Address:** provide a saved `address_id` **or** inline address fields.

        **Shipping:** `shipping_method` is required whenever the cart contains shippable items.
        Use the `shipping_methods` endpoint to get valid codes first.

        **Payment:** `payment_method` code is always required.
        Use the `payment_methods` endpoint to get valid codes first.
      security:
        - BearerAuth: []

      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: 'Bearer <token>'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              allOf:
                - $ref: '#/components/schemas/CheckoutAddress'
                - type: object
                  properties:
                    shipping_method:
                      type: string
                      description: "Shipping method code (e.g. flat.flat). Required when cart has shippable items."
                      example: flat.flat
                    payment_method:
                      type: string
                      description: "Payment method code (e.g. cod)."
                      example: cod
                    comment:
                      type: string
                      description: Optional order comment
                      example: Please leave at the door
      responses:
        '200':
          description: Order placed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutConfirmResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error (empty cart, out of stock, invalid address/method)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
</script>
<script src="https://unpkg.com/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<script src="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui-bundle.js"></script>
<script src="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui-standalone-preset.js"></script>
<script>
  window.onload = function () {
    var yamlText = document.getElementById('openapi-spec').textContent;
    var spec = jsyaml.load(yamlText);
    SwaggerUIBundle({
      spec: spec,
      dom_id: '#swagger-ui',
      deepLinking: true,
      presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
      plugins: [SwaggerUIBundle.plugins.DownloadUrl],
      layout: 'StandaloneLayout',
      persistAuthorization: true,
      displayRequestDuration: true,
      tryItOutEnabled: true,
      filter: true,
    });
  };
</script>
</body>
</html>
