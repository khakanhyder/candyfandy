name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd /home/candyfandy/public_html/dev
            echo "=== Current HEAD ==="
            git rev-parse HEAD
            echo "=== Fetching ==="
            git fetch https://${{ secrets.GH_TOKEN }}@github.com/khakanhyder/candyfandy.git main
            echo "=== FETCH_HEAD ==="
            cat .git/FETCH_HEAD
            echo "=== Resetting ==="
            git reset --hard FETCH_HEAD
            echo "=== New HEAD ==="
            git rev-parse HEAD
            echo "=== Done ==="
