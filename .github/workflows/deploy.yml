name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via cPanel Git API
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://candyfandy.com:2083/execute/VersionControl/update" \
            -H "Authorization: cpanel ${{ vars.CPANEL_USERNAME }}:${{ vars.CPANEL_API_TOKEN }}" \
            -d "repository_root=/home/candyfandy/public_html/dev")
          echo "$RESPONSE"
